<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FINDYOURPERFECTMATCH</title>

<style>
body {
  font-family: Arial, sans-serif;
  margin: 0;
  background: #f0f0f0;
}

#top-bar {
  display: flex;
  justify-content: space-between;
  align-items: center;
  background: #c0c0c0;
  padding: 10px 20px;
  border-bottom: 2px solid #808080;
  font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
}

#game-board {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(100px, 1fr));
  gap: 12px;
  justify-content: center;
  margin: 40px auto;
  max-width: 650px; /* keeps cards centered on last row */
}

.card {
  width: 100%;
  aspect-ratio: 1; /* ensures cards are square */
  perspective: 1000px;
  cursor: pointer;
}

.card-inner {
  width: 100%;
  height: 100%;
  position: relative;
  transform-style: preserve-3d;
  transition: transform 0.5s;
}

.card.flipped .card-inner {
  transform: rotateY(180deg);
}

.card-front, .card-back {
  position: absolute;
  width: 100%;
  height: 100%;
  backface-visibility: hidden;
  border-radius: 8px;
}

.card-front {
  background: url('card-back.png') no-repeat center/cover;
}

.card-back {
  transform: rotateY(180deg);
}

.card-back img {
  width: 100%;
  height: 100%;
  border-radius: 8px;
}

#popup {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.6);
  display: none;
  justify-content: center;
  align-items: center;
  z-index: 1000;
}

.popup-box {
  background: #e0e0e0;
  border: 2px solid #4a90e2;   /* ribbon color border */
  width: 300px;
  text-align: center;
  font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
  position: relative;
  border-radius: 4px;
}
  
.popup-header {
  background-color: #4a90e2; /* ribbon color */
  color: white;
  padding: 5px 10px;
  font-weight: bold;
  display: flex;
  justify-content: space-between;
  align-items: center;
  border-bottom: 2px solid #000;
  border-radius: 4px 4px 0 0;
}

  background: transparent;
  border: none;
  color: black;     
  font-size: 14px;  /* x size*/
  cursor: pointer;
  font-weight: bold;
  line-height: 1;
  padding: 0;
}

.popup-box p {
  margin: 15px 0; /* more space above and below the text */
}

.popup-box button {
  margin: 10px 5px 15px 5px; /* bottom margin for spacing */
  padding: 5px 12px;
  background: #c0c0c0;
  border: 1px solid #000;
  cursor: pointer;
  font-weight: bold;
}
</style>
</head>

<body>

<div id="top-bar">
  <button onclick="exitGame()">Exit</button>
  <span id="timer">00:00</span>
</div>

<div id="game-board"></div>

<div id="popup">
  <div class="popup-box">
    <div class="popup-header">
      <span>Perfect Match!</span>
      <button class="popup-close" onclick="closePopup()">×</button>
    </div>
    <p id="popup-text"></p>
    <div class="popup-buttons">
      <button id="go-button" onclick="goToLink()">Go</button>
      <button id="back-button" onclick="closePopup()">Back</button>
    </div>
  </div>
</div>
  
<audio id="flip-sound" src="flip.mp3"></audio>
<audio id="bg-music" src="background.mp3" loop autoplay></audio>

<script>
// ====== CONFIG ======
const cardsData = [
  { type: "stan", img: "stan.png" }, { type: "stan", img: "stan.png" },
  { type: "clyde", img: "clyde.png" }, { type: "clyde", img: "clyde.png" },
  { type: "wendy", img: "wendy.png" }, { type: "wendy", img: "wendy.png" },
  { type: "bebe", img: "bebe.png" }, { type: "bebe", img: "bebe.png" },
  { type: "craig", img: "craig.png" }, { type: "craig", img: "craig.png" },
  { type: "tweek", img: "tweek.png" }, { type: "tweek", img: "tweek.png" },
  { type: "tammy", img: "tammy.png" }, { type: "tammy", img: "tammy.png" },
  { type: "kyle", img: "kyle.png" }, { type: "kyle", img: "kyle.png" },
  { type: "cartman", img: "cartman.png" }, { type: "cartman", img: "cartman.png" },
  { type: "marj", img: "marj.png" }, { type: "marj", img: "marj.png" },
  { type: "leo", img: "leo.png" }, { type: "leo", img: "leo.png" },
  { type: "pete", img: "pete.png" }, { type: "pete", img: "pete.png" },
  { type: "michael", img: "michael.png" }, { type: "michael", img: "michael.png" },
  { type: "henri", img: "henri.png" }, { type: "henri", img: "henri.png" },
  { type: "dova", img: "dova.png" }, { type: "dova", img: "dova.png" },
  { type: "kenny", img: "kenny.png" }, { type: "kenny", img: "kenny.png" },
  { type: "dami", img: "dami.png" }, { type: "dami", img: "dami.png" }  
];

// 14 valid matches (directional for story purposes)
const matchResults = {
  "tweek-craig": { message: "Story 1!", link: "https://link1.com" },
  "craig-tweek": { message: "Story 2!", link: "https://link2.com" },
  "dami-dova": { message: "Story 3!", link: "https://link3.com" },
  "dova-dami": { message: "Story 3!", link: "https://link3.com" },
  "kenny-clyde": { message: "Story 4!", link: "https://link4.com" },
  "clyde-kenny": { message: "Story 5!", link: "https://link5.com" },
  "craig-leo": { message: "Story 6!", link: "https://link6.com" },
  "leo-craig": { message: "Story 6!", link: "https://link6.com" },
  "stan-tammy": { message: "Story 7!", link: "https://link7.com" },
  "tammy-stan": { message: "Story 7!", link: "https://link7.com" },
  "wendy-craig": { message: "Story 8!", link: "https://link8.com" },
  "craig-wendy": { message: "Story 8!", link: "https://link8.com" },
  "stan-kenny": { message: "Story 9!", link: "https://link9.com" },
  "kenny-stan": { message: "Story 9!", link: "https://link9.com" },
  "stan-tweek": { message: "Story 10!", link: "https://link10.com" },
  "tweek-stan": { message: "Story 10!", link: "https://link10.com" },
  "stan-marj": { message: "Story 11!", link: "https://link11.com" },
  "marj-stan": { message: "Story 11!", link: "https://link11.com" },
  "leo-stan": { message: "Story 12!", link: "https://link12.com" },
  "stan-leo": { message: "Story 12!", link: "https://link12.com" },
  "wendy-tammy": { message: "Story 13!", link: "https://link13.com" },
  "tammy-wendy": { message: "Story 13!", link: "https://link13.com" },
  "stan-kyle": { message: "Story 14!", link: "https://link14.com" },
  "kyle-stan": { message: "Story 14!", link: "https://link14.com" }
};

const noMatchPopups = {
  "pete": "keep away",
  "henri": "too close",
  "michael": "too close"
};


// ====== SETUP ======
const board = document.getElementById("game-board");
cardsData.sort(() => Math.random() - 0.5);

cardsData.forEach(card => {
  const cardDiv = document.createElement("div");
  cardDiv.className = "card";
  cardDiv.dataset.type = card.type;

  cardDiv.innerHTML = `
    <div class="card-inner">
      <div class="card-front"></div>
      <div class="card-back">
        <img src="${card.img}">
      </div>
    </div>
  `;

  cardDiv.addEventListener("click", () => flipCard(cardDiv));
  board.appendChild(cardDiv);
});

// ====== GAME LOGIC ======
let firstCard = null;
let secondCard = null;
let lock = false;
let currentLink = "";
let popupMode = "match";

function flipCard(card) {
  if (lock || card.classList.contains("flipped")) return;
  if (firstCard === card) return;

  const flipSound = document.getElementById('flip-sound');
  flipSound.currentTime = 0;  // reset to start
  flipSound.play();            // play sound

  card.classList.add("flipped");

  if (!firstCard) {
    firstCard = card;
  } else {
    secondCard = card;
    checkMatch();
  }
}

function checkMatch() {
  lock = true;

  const t1 = firstCard.dataset.type;
  const t2 = secondCard.dataset.type;
  const key = `${t1}-${t2}`;

  if (matchResults[key]) {
    currentLink = matchResults[key].link;
    popupMode = "match";
    // Delay popup to show the second card flip
    setTimeout(() => {
      showPopup(matchResults[key].message, "go!", "back");
    }, 500); // 500ms delay
  } else if (noMatchPopups[t1] || noMatchPopups[t2]) {
    let msg = noMatchPopups[t1] || noMatchPopups[t2];
    popupMode = "nomatch";
    setTimeout(() => {
      showPopup(msg, "okay.");
    }, 500); // same delay for consistency
    setTimeout(() => {
      firstCard.classList.remove("flipped");
      secondCard.classList.remove("flipped");
    }, 1000); // give user time to see cards before they flip back
  } else {
    setTimeout(() => {
      firstCard.classList.remove("flipped");
      secondCard.classList.remove("flipped");
      reset();
    }, 800);
  }
}

function reset() {
  firstCard = null;
  secondCard = null;
  lock = false;
}

// ====== POPUP ======
function showPopup(msg, button1Text, button2Text) {
  const popupBox = document.getElementById("popup");
  const header = popupBox.querySelector(".popup-header span");
  const goBtn = document.getElementById("go-button");
  const backBtn = document.getElementById("back-button");

  document.getElementById("popup-text").innerText = msg;

  if (popupMode === "nomatch") {
    header.innerText = "error";             // ribbon shows "Error"
    goBtn.style.display = 'none';
    backBtn.style.display = 'inline-block';
    backBtn.innerText = button1Text || "okay.";
  } else {
    header.innerText = "perfect match!";    // ribbon shows default
    goBtn.style.display = 'inline-block';
    backBtn.style.display = 'inline-block';
    goBtn.innerText = button1Text || "go!";
    backBtn.innerText = button2Text || "back";
  }

  popupBox.style.display = "flex";
}

function closePopup() {
  document.getElementById("popup").style.display = "none";

  // Flip cards back if it was a story popup
  if (popupMode === "match" && firstCard && secondCard) {
    firstCard.classList.remove("flipped");
    secondCard.classList.remove("flipped");
  }

  reset();
}

function goToLink() {
  if (popupMode === "match") {
    window.location.href = currentLink;
  } else {
    closePopup();
  }
}

function exitGame() {
  if (confirm('Exit game?')) {
    window.location.href = '/';
  }
}

// ====== TIMER ======
let seconds = 0;
let minutes = 0;
setInterval(() => {
  seconds++;
  if (seconds >= 60) { seconds = 0; minutes++; }
  document.getElementById('timer').innerText = 
    `${minutes.toString().padStart(2,'0')}:${seconds.toString().padStart(2,'0')}`;
}, 1000);
</script>

</body>
</html>
