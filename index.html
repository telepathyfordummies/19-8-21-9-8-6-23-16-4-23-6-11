<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FINDYOURPERFECTMATCH</title>

<style>
body {
  font-family: Arial, sans-serif;
  margin: 0;
  background: #f0f0f0;
}

#top-bar {
  display: flex;
  justify-content: space-between;
  align-items: center;
  background: #c0c0c0;
  padding: 10px 20px;
  border-bottom: 2px solid #808080;
  font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
}

#game-board {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(100px, 1fr));
  gap: 12px;
  justify-content: center;
  margin: 40px auto;
  max-width: 650px; /* keeps cards centered on last row */
}

.card {
  width: 100%;
  aspect-ratio: 1; /* ensures cards are square */
  perspective: 1000px;
  cursor: pointer;
}

.card-inner {
  width: 100%;
  height: 100%;
  position: relative;
  transform-style: preserve-3d;
  transition: transform 0.5s;
}

.card.flipped .card-inner {
  transform: rotateY(180deg);
}

.card-front, .card-back {
  position: absolute;
  width: 100%;
  height: 100%;
  backface-visibility: hidden;
  border-radius: 8px;
}

.card-front {
  background: url('card-back.png') no-repeat center/cover;
}

.card-back {
  transform: rotateY(180deg);
}

.card-back img {
  width: 100%;
  height: 100%;
  border-radius: 8px;
}

#popup {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.6);
  display: none;
  justify-content: center;
  align-items: center;
  z-index: 1000;
}

.popup-box {
  background: #e0e0e0;
  border: 2px solid #4a90e2;   /* ribbon color border */
  width: 300px;
  text-align: center;
  font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
  position: relative;
  border-radius: 4px;
}
  
.popup-header {
  background-color: #4a90e2; /* ribbon color */
  color: white;
  padding: 5px 10px;
  font-weight: bold;
  display: flex;
  justify-content: space-between;
  align-items: center;
  border-bottom: 2px solid #000;
  border-radius: 4px 4px 0 0;
}

  background: transparent;
  border: none;
  color: black;     
  font-size: 14px;  /* x size*/
  cursor: pointer;
  font-weight: bold;
  line-height: 1;
  padding: 0;
}

.popup-box p {
  margin: 15px 0; /* more space above and below the text */
}

.popup-box button {
  margin: 10px 5px 15px 5px; /* bottom margin for spacing */
  padding: 5px 12px;
  background: #c0c0c0;
  border: 1px solid #000;
  cursor: pointer;
  font-weight: bold;
}

  #rules-popup {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.6);
  display: none;
  justify-content: center;
  align-items: center;
  z-index: 1000;
}
  
</style>
</head>

<body>

<div id="top-bar">
  <div>
    <button onclick="exitGame()">Exit</button>
    <button onclick="showRules()">Rules</button>
  </div>
  <span id="timer">00:00</span>
</div>

  <div id="rules-popup">
  <div class="popup-box">
    <div class="popup-header">
      <span>Game Rules</span>
      <button class="popup-close" onclick="closeRules()">×</button>
    </div>
    <p>
      1. Click a card to flip it.<br>
      2. Flip a second card to try to make a match.<br>
      3. Some cards have no matches.<br>
      4. If the match is correct, you will be told.<br>
      5. There are fourteen matches total.<br>
      6. Sometimes order matters.
    </p>
    <div class="popup-buttons">
      <button onclick="closeRules()">Close</button>
    </div>
  </div>
</div>

<div id="game-board"></div>

<div id="popup">
  <div class="popup-box">
    <div class="popup-header">
      <span>Perfect Match!</span>
      <button class="popup-close" onclick="closePopup()">×</button>
    </div>
    <p id="popup-text"></p>
    <div class="popup-buttons">
      <button id="go-button" onclick="goToLink()">Go</button>
      <button id="back-button" onclick="closePopup()">Back</button>
    </div>
  </div>
</div>
  
<audio id="flip-sound" src="flip.mp3"></audio>
<audio id="bg-music" src="background.mp3" loop autoplay></audio>

<script>

  // ======BACKGROUND MUSIC. LEAVING VOLUME NOTES HERE BC U ALWAYS FORGET =====
  const bgMusic = document.getElementById('bg-music');
bgMusic.volume = 0.2; // 0.0 = silent, 1.0 = full volume

  // ======RULESSSS===== 

  function showRules() {
  document.getElementById('rules-popup').style.display = 'flex';
}

function closeRules() {
  document.getElementById('rules-popup').style.display = 'none';
}
  
// ====== CONFIG ======
const cardsData = [
  { type: "stan", img: "stan.png" }, { type: "stan", img: "stan.png" },
  { type: "clyde", img: "clyde.png" }, { type: "clyde", img: "clyde.png" },
  { type: "wendy", img: "wendy.png" }, { type: "wendy", img: "wendy.png" },
  { type: "bebe", img: "bebe.png" }, { type: "bebe", img: "bebe.png" },
  { type: "craig", img: "craig.png" }, { type: "craig", img: "craig.png" },
  { type: "tweek", img: "tweek.png" }, { type: "tweek", img: "tweek.png" },
  { type: "tammy", img: "tammy.png" }, { type: "tammy", img: "tammy.png" },
  { type: "kyle", img: "kyle.png" }, { type: "kyle", img: "kyle.png" },
  { type: "cartman", img: "cartman.png" }, { type: "cartman", img: "cartman.png" },
  { type: "marj", img: "marj.png" }, { type: "marj", img: "marj.png" },
  { type: "leo", img: "leo.png" }, { type: "leo", img: "leo.png" },
  { type: "pete", img: "pete.png" }, { type: "pete", img: "pete.png" },
  { type: "michael", img: "michael.png" }, { type: "michael", img: "michael.png" },
  { type: "henri", img: "henri.png" }, { type: "henri", img: "henri.png" },
  { type: "dova", img: "dova.png" }, { type: "dova", img: "dova.png" },
  { type: "kenny", img: "kenny.png" }, { type: "kenny", img: "kenny.png" },
  { type: "dami", img: "dami.png" }, { type: "dami", img: "dami.png" }  
];

// 14 valid matches (directional for story purposes)
const matchResults = {
  "tweek-craig": { message: "You have selected players Tweek and Craig. Do you wish to proceed?", link: "https://archiveofourown.org/works/82304586" },
  "craig-tweek": { message: "You have selected players Craig and Tweek. Do you wish to proceed?", link: "https://archiveofourown.org/works/82303936" },
  "dami-dova": { message: "You have selected players Damien and Dovakien. Do you wish to proceed?", link: "https://archiveofourown.org/works/82303381" },
  "dova-dami": { message: "You have selected players Dovakien and Damien. Do you wish to proceed?", link: "https://archiveofourown.org/works/82303381" },
  "kenny-clyde": { message: "You have selected players Kenny and Clyde. Do you wish to proceed?", link: "https://archiveofourown.org/works/82303536" },
  "clyde-kenny": { message: "You have selected players Clyde and Kenny. Do you wish to proceed?", link: "https://archiveofourown.org/works/82303591" },
  "craig-leo": { message: "You have selected players Craig and Leo. Do you wish to proceed?", link: "https://archiveofourown.org/works/82303811" },
  "leo-craig": { message: "You have selected players Leo and Craig. Do you wish to proceed?", link: "https://archiveofourown.org/works/82303811" },
  "stan-tammy": { message: "You have selected players Stan and Tammy. Do you wish to proceed?", link: "https://archiveofourown.org/works/82304021" },
  "tammy-stan": { message: "You have selected players Tammy and Stan. Do you wish to proceed?", link: "https://archiveofourown.org/works/82304021" },
  "wendy-craig": { message: "You have selected players Wendy and Craig. Do you wish to proceed?", link: "https://archiveofourown.org/works/82304141" },
  "craig-wendy": { message: "You have selected players Craig and Wendy. Do you wish to proceed?", link: "https://archiveofourown.org/works/82304141" },
  "stan-kenny": { message: "You have selected players Stan and Kenny. Do you wish to proceed?", link: "https://archiveofourown.org/works/82304286" },
  "kenny-stan": { message: "You have selected players Kenny and Stan. Do you wish to proceed?", link: "https://archiveofourown.org/works/82304286" },
  "stan-tweek": { message: "You have selected players Stan and Tweek. Do you wish to proceed?", link: "https://archiveofourown.org/works/82304431" },
  "tweek-stan": { message: "You have selected players Tweek and Stan. Do you wish to proceed?", link: "https://archiveofourown.org/works/82304431" },
  "stan-marj": { message: "You have selected players Stan and Marj. Do you wish to proceed?", link: "https://archiveofourown.org/works/82304731" },
  "marj-stan": { message: "You have selected players Marj and Stan. Do you wish to proceed?", link: "https://archiveofourown.org/works/82304731" },
  "leo-stan": { message: "You have selected players Leo and Stan. Do you wish to proceed?", link: "https://archiveofourown.org/works/82305226" },
  "stan-leo": { message: "You have selected players Stan and Kenny. Do you wish to proceed?", link: "https://archiveofourown.org/works/82305226" },
  "wendy-tammy": { message: "You have selected players Wendy and Tammy. Do you wish to proceed?", link: "https://archiveofourown.org/works/82305491" },
  "tammy-wendy": { message: "You have selected players Tammy and Wendy. Do you wish to proceed?", link: "https://archiveofourown.org/works/82305491" },
  "stan-kyle": { message: "You have selected players Stan and Kyle. Do you wish to proceed?", link: "https://archiveofourown.org/works/82304986" },
  "kyle-stan": { message: "You have selected players Kyle and Stan. Do you wish to proceed?", link: "https://archiveofourown.org/works/82304986" }
};

const noMatchPopups = {
  "pete": "KEEP AWAY. KEEP AWAY. KE8P AWAY.",
  "henri": "TOO 6LOSE.",
  "michael": "TOO CLOSE."
};


// ====== SETUP ======
const board = document.getElementById("game-board");
cardsData.sort(() => Math.random() - 0.5);

cardsData.forEach(card => {
  const cardDiv = document.createElement("div");
  cardDiv.className = "card";
  cardDiv.dataset.type = card.type;

  cardDiv.innerHTML = `
    <div class="card-inner">
      <div class="card-front"></div>
      <div class="card-back">
        <img src="${card.img}">
      </div>
    </div>
  `;

  cardDiv.addEventListener("click", () => flipCard(cardDiv));
  board.appendChild(cardDiv);
});

// ====== GAME LOGIC ======
let firstCard = null;
let secondCard = null;
let lock = false;
let currentLink = "";
let popupMode = "match";

let bgStarted = false; // ensures music plays only once

function flipCard(card) {
  if (lock || card.classList.contains("flipped")) return;
  if (firstCard === card) return;

  // ===== Play background music on first interaction =====
  if (!bgStarted) {
    const bgMusic = document.getElementById('bg-music');
    bgMusic.volume = 0.2; // lower volume
    bgMusic.play().catch(() => {
      console.log("User interaction required for autoplay");
    });
    bgStarted = true;
  }

  // ===== Play flip sound =====
  const flipSound = document.getElementById('flip-sound');
  flipSound.currentTime = 0;  // reset to start
  flipSound.play();

  // ===== Flip the card =====
  card.classList.add("flipped");

  if (!firstCard) {
    firstCard = card;
  } else {
    secondCard = card;
    lock = true; // prevent clicking other cards during delay

    // ===== Add a short delay before checking match =====
    setTimeout(() => {
      checkMatch();
    }, 400); // 400ms delay so player sees the second card flip
  }
}

  

function checkMatch() {
  lock = true;

  const t1 = firstCard.dataset.type;
  const t2 = secondCard.dataset.type;
  const key = `${t1}-${t2}`;

  if (matchResults[key]) {
    currentLink = matchResults[key].link;
    popupMode = "match";
    // Delay popup to show the second card flip
    setTimeout(() => {
      showPopup(matchResults[key].message, "go!", "back");
    }, 500); // 500ms delay
  } else if (noMatchPopups[t1] || noMatchPopups[t2]) {
    let msg = noMatchPopups[t1] || noMatchPopups[t2];
    popupMode = "nomatch";
    setTimeout(() => {
      showPopup(msg, "okay.");
    }, 500); // same delay for consistency
    setTimeout(() => {
      firstCard.classList.remove("flipped");
      secondCard.classList.remove("flipped");
    }, 1000); // give user time to see cards before they flip back
  } else {
    setTimeout(() => {
      firstCard.classList.remove("flipped");
      secondCard.classList.remove("flipped");
      reset();
    }, 800);
  }
}

function reset() {
  firstCard = null;
  secondCard = null;
  lock = false;
}

// ====== POPUP ======
function showPopup(msg, button1Text, button2Text) {
  const popupBox = document.getElementById("popup");
  const header = popupBox.querySelector(".popup-header span");
  const goBtn = document.getElementById("go-button");
  const backBtn = document.getElementById("back-button");

  document.getElementById("popup-text").innerText = msg;

  if (popupMode === "nomatch") {
    header.innerText = "error";             // ribbon shows "Error"
    goBtn.style.display = 'none';
    backBtn.style.display = 'inline-block';
    backBtn.innerText = button1Text || "okay.";
  } else {
    header.innerText = "perfect match!";    // ribbon shows default
    goBtn.style.display = 'inline-block';
    backBtn.style.display = 'inline-block';
    goBtn.innerText = button1Text || "go!";
    backBtn.innerText = button2Text || "back";
  }

  popupBox.style.display = "flex";
}

function closePopup() {
  document.getElementById("popup").style.display = "none";

  // Flip cards back if it was a story popup
  if (popupMode === "match" && firstCard && secondCard) {
    firstCard.classList.remove("flipped");
    secondCard.classList.remove("flipped");
  }

  reset();
}

function goToLink() {
  if (popupMode === "match") {
    window.location.href = currentLink;
  } else {
    closePopup();
  }
}

function exitGame() {
  if (confirm('Exit game?')) {
    window.location.href = '/';
  }
}

// ====== TIMER ======
let seconds = 0;
let minutes = 0;
setInterval(() => {
  seconds++;
  if (seconds >= 60) { seconds = 0; minutes++; }
  document.getElementById('timer').innerText = 
    `${minutes.toString().padStart(2,'0')}:${seconds.toString().padStart(2,'0')}`;
}, 1000);
</script>

</body>
</html>
